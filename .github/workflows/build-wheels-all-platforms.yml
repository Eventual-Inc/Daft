name: Build Wheels Artifacts (Linux and macOS)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build wheel (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            runner: ubuntu-latest
            maturin_args: --target aarch64-unknown-linux-gnu --compatibility manylinux_2_28 --zig
          - name: macos
            runner: macos-15
            maturin_args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/daft-dashboard/frontend/package-lock.json

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.platform.name }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform.name }}-cargo-

      - name: Bootstrap build toolchain (fast path)
        run: |
          if command -v rustup > /dev/null 2>&1; then
            rustup --version
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

          if command -v uv > /dev/null 2>&1; then
            uv --version
          else
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Verify toolchain versions
        run: |
          set -euo pipefail
          python --version
          node --version
          npm --version
          rustup --version

      - name: Build dashboard assets
        working-directory: src/daft-dashboard/frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install Zig for Linux cross-build
        if: matrix.platform.name == 'linux'
        run: |
          set -euo pipefail
          ZIG_VERSION="0.13.0"
          ZIG_DIR="$HOME/.local/zig-${ZIG_VERSION}"
          mkdir -p "$HOME/.local"
          curl --retry 5 --retry-delay 2 --retry-connrefused -fsSL \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
            -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C "$HOME/.local"
          mv "$HOME/.local/zig-linux-x86_64-${ZIG_VERSION}" "$ZIG_DIR"
          echo "$ZIG_DIR" >> "$GITHUB_PATH"
          "$ZIG_DIR/zig" version

      - name: Install Rust target for Linux cross-build
        if: matrix.platform.name == 'linux'
        run: |
          set -euo pipefail
          rustup target add aarch64-unknown-linux-gnu
          rustup target list --installed | grep -E '^aarch64-unknown-linux-gnu$'

      - name: Build wheel (single command)
        # Keep this path simple and deterministic to reduce CI overhead and debugging complexity.
        run: |
          set -euo pipefail
          PY_BIN="$(command -v python)"
          "$PY_BIN" --version
          uvx --from maturin==1.13.3 maturin build --release --out dist -i "$PY_BIN" ${{ matrix.platform.maturin_args }}
        env:
          GITHUB_ACTIONS: "true"

      - name: Verify wheel outputs
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [[ ${#wheels[@]} -eq 0 ]]; then
            echo "No wheel files found in dist" >&2
            exit 1
          fi

          ls -lh dist/*.whl
          shasum -a 256 dist/*.whl

      - name: Upload wheels as pipeline artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform.name }}-${{ github.run_id }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14
