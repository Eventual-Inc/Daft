name: Check Broken Links on daft.ai

on:
  schedule:
  - cron: 0 20 * * *
  workflow_dispatch:

permissions: {}

jobs:
  check-links:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site:
        - url: https://www.daft.ai
        - url: https://docs.daft.ai/en/stable/
        - url: https://www.eventual.ai
    steps:
    - name: Check ${{ matrix.site.url }}
      uses: lycheeverse/lychee-action@v2.8.0
      id: lychee
      with:
        args: >-
          --exclude '^https?://scarf\.sh'
          --exclude '^https?://static\.scarf\.sh'
          --exclude '^https?://www\.allaboutcookies\.org'
          --exclude '^https?://www\.kaggle\.com'
          --exclude '^https?://x\.com'
          --exclude '^https?://twitter\.com'
          --exclude '^https?://www\.linkedin\.com'
          --timeout 30
          --retry-wait-time 5
          --max-retries 3
          --max-concurrency 8
          --no-progress
          --format json
          ${{ matrix.site.url }}
        output: results.json
        fail: false
    - name: Fail only on 404s
      run: |
        if [ ! -f results.json ]; then
          echo "No results file found"
          exit 0
        fi

        # Extract URLs that returned 404
        FAILED_404=$(jq -r '
          .error_map // {} | to_entries[] |
          .value[] | select(.status and (.status.code == 404)) |
          "\(.url) -> \(.status.code)"
        ' results.json || true)

        # Show all failures for visibility
        echo "=== Full lychee results ==="
        jq -r '.error_map // {} | to_entries[] | .value[] | "\(.url) [\(.status.code // .status.text // "unknown")]"' results.json 2>/dev/null || true

        if [ -n "$FAILED_404" ]; then
          echo ""
          echo "=== 404 errors (failing) ==="
          printf "%s\n" "$FAILED_404"
          exit 1
        else
          echo ""
          echo "No 404 errors detected."
        fi
  notify_on_failure:
    runs-on: ubuntu-latest
    if: failure()
    needs: check-links
    steps:
    - name: Send Slack notification on failure
      if: ${{ env.SLACK_WEBHOOK_URL }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      uses: slackapi/slack-github-action@v2.1.1
      with:
        payload: |
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":rotating_light: [NIGHTLY] Broken Link Checker <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|workflow> *FAILED* :rotating_light:"
                }
              }
            ]
          }
        webhook: ${{ env.SLACK_WEBHOOK_URL }}
        webhook-type: incoming-webhook
