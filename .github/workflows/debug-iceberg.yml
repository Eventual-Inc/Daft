name: Debug Iceberg Integration

on:
  workflow_dispatch:

jobs:
  debug-iceberg:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 0

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: "17"

    - name: Setup Python and uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.10"
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Setup Virtual Env
      run: |
        uv venv --seed .venv
        echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        source .venv/bin/activate
        uv sync --all-extras --all-groups

    - name: Build Daft
      run: |
        source .venv/bin/activate
        make build

    - uses: docker/setup-buildx-action@v4

    - uses: docker/build-push-action@v7
      with:
        context: ./tests/integration/iceberg/docker-compose/
        file: ./tests/integration/iceberg/docker-compose/Dockerfile
        cache-from: type=gha
        cache-to: type=gha,mode=min

    - name: Spin up Iceberg services
      run: |
        pushd ./tests/integration/iceberg/docker-compose/
        docker compose -f ./docker-compose.yml up -d
        popd

    - name: Show Iceberg service status
      run: |
        docker compose -f tests/integration/iceberg/docker-compose/docker-compose.yml ps

    - name: Wait for Iceberg test tables
      run: |
        source .venv/bin/activate
        python tests/integration/iceberg/docker-compose/wait-for-tables.py

    - name: Run Iceberg integration smoke test
      run: |
        source .venv/bin/activate
        DAFT_RUNNER=native pytest tests/integration/iceberg/test_iceberg_reads.py::test_daft_iceberg_table_open -m integration -q

    - name: Dump Iceberg logs
      if: always()
      run: |
        docker compose -f tests/integration/iceberg/docker-compose/docker-compose.yml logs --tail=300 || true
        docker compose -f tests/integration/iceberg/docker-compose/docker-compose.yml ps || true
