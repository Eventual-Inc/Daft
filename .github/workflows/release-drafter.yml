name: Release Drafter

on:
  push:
    # branches to consider in the event; optional, defaults to all
    branches:
    - main
  workflow_dispatch:

permissions:
  # write permission is required to create a github release
  contents: write
  # write permission is required for autolabeler (which we don't use here)
  # otherwise, read permission is required at least
  pull-requests: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
    - name: Update draft release notes
      uses: actions/github-script@v7
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const draftTagPlaceholder = 'v0.0.0-next';

          const { data: releases } = await github.rest.repos.listReleases({
            owner,
            repo,
            per_page: 100,
          });

          const publishedReleases = releases.filter((release) => !release.draft && !release.prerelease);
          const draftRelease = releases.find((release) => release.draft);

          const parseSemver = (tag) => {
            const match = tag.replace(/^v/i, '').match(/^(\d+)\.(\d+)\.(\d+)/);
            if (!match) {
              return null;
            }
            return [Number(match[1]), Number(match[2]), Number(match[3])];
          };

          const compareSemver = (left, right) => {
            for (let index = 0; index < 3; index += 1) {
              if (left[index] !== right[index]) {
                return left[index] - right[index];
              }
            }
            return 0;
          };

          const previousTag = publishedReleases
            .map((release) => ({ tag: release.tag_name, semver: parseSemver(release.tag_name) }))
            .filter((release) => release.semver)
            .sort((left, right) => compareSemver(right.semver, left.semver))[0]?.tag;

          let tagName;
          let releaseId;

          if (draftRelease) {
            tagName = draftRelease.tag_name;
            releaseId = draftRelease.id;
          } else {
            tagName = draftTagPlaceholder;
            const { data: newDraft } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tagName,
              target_commitish: 'main',
              name: tagName,
              body: '',
              draft: true,
            });
            releaseId = newDraft.id;
          }

          const generateNotesParams = {
            owner,
            repo,
            tag_name: tagName,
            target_commitish: 'main',
            configuration_file_path: '.github/release.yml',
          };
          if (previousTag) {
            generateNotesParams.previous_tag_name = previousTag;
          }

          const { data: notes } = await github.rest.repos.generateReleaseNotes(generateNotesParams);

          await github.rest.repos.updateRelease({
            owner,
            repo,
            release_id: releaseId,
            body: notes.body,
            name: notes.name || tagName,
          });

          core.info(`Updated draft release ${tagName}${previousTag ? ` since ${previousTag}` : ''}`);
