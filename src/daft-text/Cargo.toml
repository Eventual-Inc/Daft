[dependencies]
daft-common = {workspace = true}
daft-core = {path = "../daft-core", version = "0.7.9", default-features = false}
daft-io = {path = "../daft-io", version = "0.7.9", default-features = false}
daft-recordbatch = {path = "../daft-recordbatch", version = "0.7.9", default-features = false}
futures = {workspace = true}
async-stream = {workspace = true}
serde = {workspace = true}
tokio = {workspace = true}
tokio-stream = {workspace = true, features = ["io-util"]}
tokio-util = {workspace = true}

[dev-dependencies]
flate2 = {version = "1.1", features = ["zlib-rs"], default-features = false}

[features]
python = [
  "daft-common/python",
  "daft-core/python",
  "daft-io/python",
  "daft-recordbatch/python"
]

[lints]
workspace = true

[package]
license.workspace = true
repository.workspace = true
homepage.workspace = true
edition = {workspace = true}
name = "daft-text"
version = {workspace = true}
description = "Text file reader for Daft"
