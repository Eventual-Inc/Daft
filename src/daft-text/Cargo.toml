[dependencies]
daft-common-error = {path = "../common/error", default-features = false, version = "0.3.0-dev0"}
daft-compression = {path = "../daft-compression", default-features = false, version = "0.3.0-dev0"}
daft-core = {path = "../daft-core", default-features = false, version = "0.3.0-dev0"}
daft-io = {path = "../daft-io", default-features = false, version = "0.3.0-dev0"}
daft-recordbatch = {path = "../daft-recordbatch", default-features = false, version = "0.3.0-dev0"}
futures = {workspace = true}
async-stream = {workspace = true}
serde = {workspace = true}
tokio = {workspace = true}
tokio-stream = {workspace = true, features = ["io-util"]}
tokio-util = {workspace = true}

[dev-dependencies]
flate2 = {version = "1.1", features = ["zlib-rs"], default-features = false}

[features]
python = [
  "daft-common-error/python",
  "daft-core/python",
  "daft-io/python",
  "daft-recordbatch/python"
]

[lints]
workspace = true

[package]
edition = {workspace = true}
name = "daft-text"
repository = {workspace = true}
license = {workspace = true}
description = "Text file reader for Daft"
version = {workspace = true}
