[dependencies]
daft-common = {workspace = true}
daft-context = {path = "../daft-context", default-features = false}
daft-dsl = {path = "../daft-dsl", default-features = false}
daft-functions = {path = "../daft-functions", default-features = false}
daft-io = {path = "../daft-io", default-features = false}
daft-local-plan = {path = "../daft-local-plan", default-features = false}
daft-logical-plan = {path = "../daft-logical-plan", default-features = false}
daft-scan = {path = "../daft-scan", default-features = false}
daft-micropartition = {path = "../daft-micropartition", default-features = false}
daft-recordbatch = {path = "../daft-recordbatch", default-features = false}
daft-schema = {path = "../daft-schema", default-features = false}
futures = {workspace = true}
pyo3 = {workspace = true, optional = true}
pyo3-async-runtimes = {workspace = true, optional = true}
rand = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
tokio = {workspace = true}
tokio-stream = {workspace = true}
tokio-util = {workspace = true}
tracing = {workspace = true}
itertools = {workspace = true}
opentelemetry = {workspace = true}

[features]
python = [
  "daft-common/python",
  "dep:pyo3",
  "dep:pyo3-async-runtimes",
  "daft-logical-plan/python",
  "daft-local-plan/python",
  "daft-scan/python",
  "daft-context/python"
]

[dev-dependencies]
arrow = {workspace = true}
daft-core = {path = "../daft-core", default-features = false}
daft-local-execution = {path = "../daft-local-execution", default-features = false}

[lints]
workspace = true

[package]
license.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false
edition = {workspace = true}
name = "daft-distributed"
version = {workspace = true}
