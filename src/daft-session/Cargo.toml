[dependencies]
daft-common = {workspace = true}
daft-ai = {workspace = true}
daft-context = {path = "../daft-context", version = "0.7.9", default-features = false}
daft-core = {workspace = true}
daft-dsl = {workspace = true}
daft-ext = {workspace = true}
daft-ext-internal = {workspace = true}
daft-logical-plan = {workspace = true}
daft-micropartition = {path = "../daft-micropartition", version = "0.7.9", default-features = false}
indexmap = {workspace = true}
pyo3 = {workspace = true, optional = true}
regex = {workspace = true}
snafu = {workspace = true}
sqlparser = {workspace = true}
uuid = {workspace = true}

[features]
python = [
  "dep:pyo3",
  "daft-ai/python",
  "daft-common/python",
  "daft-context/python",
  "daft-core/python",
  "daft-dsl/python",
  "daft-logical-plan/python",
  "daft-micropartition/python"
]

[dev-dependencies]
serde = {workspace = true}
typetag = {workspace = true}

[lints]
workspace = true

[package]
license.workspace = true
repository.workspace = true
homepage.workspace = true
name = "daft-session"
edition.workspace = true
version.workspace = true
