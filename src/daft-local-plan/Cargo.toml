[dependencies]
daft-common = {workspace = true}
daft-core = {path = "../daft-core", version = "0.7.9", default-features = false}
daft-dsl = {path = "../daft-dsl", version = "0.7.9", default-features = false}
daft-logical-plan = {path = "../daft-logical-plan", version = "0.7.9", default-features = false}
daft-micropartition = {path = "../daft-micropartition", version = "0.7.9", default-features = false}
daft-scan = {path = "../daft-scan", version = "0.7.9", default-features = false}
daft-recordbatch = {path = "../daft-recordbatch", version = "0.7.9", default-features = false}
bincode = {workspace = true}
arrow-schema = {workspace = true}
arrow-array = {workspace = true}
log = {workspace = true}
pyo3 = {workspace = true, optional = true}
serde = {workspace = true}
serde_json = {workspace = true}
strum = {version = "0.27", features = ["derive"]}
indexmap = {workspace = true}
daft-functions = {path = "../daft-functions", version = "0.7.9", default-features = false}

[features]
python = [
  "daft-common/python",
  "dep:pyo3",
  "daft-core/python",
  "daft-dsl/python",
  "daft-logical-plan/python",
  "daft-micropartition/python",
  "daft-scan/python"
]

[lints]
workspace = true

[package]
license.workspace = true
repository.workspace = true
homepage.workspace = true
edition = {workspace = true}
name = "daft-local-plan"
version = {workspace = true}
description = "Physical plan translation for local execution in Daft"
