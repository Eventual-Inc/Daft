[dependencies]
daft-algebra = {path = "../daft-algebra", version = "0.7.9", default-features = false}
daft-common = {workspace = true}
daft-checkpoint = {path = "../daft-checkpoint", version = "0.7.9", default-features = false, features = ["s3"]}
daft-core = {path = "../daft-core", version = "0.7.9", default-features = false}
daft-dsl = {path = "../daft-dsl", version = "0.7.9", default-features = false}
daft-functions = {path = "../daft-functions", version = "0.7.9", default-features = false}
daft-scan = {path = "../daft-scan", version = "0.7.9", default-features = false}
daft-recordbatch = {path = "../daft-recordbatch", version = "0.7.9", default-features = false}
daft-schema = {path = "../daft-schema", version = "0.7.9", default-features = false}
educe = {workspace = true}
indexmap = {workspace = true}
itertools = {workspace = true}
log = {workspace = true}
num-format = {workspace = true}
pyo3 = {workspace = true, optional = true}
serde = {workspace = true, features = ["rc"]}
snafu = {workspace = true}
tokio = {workspace = true}
serde_json.workspace = true
uuid.workspace = true

[dev-dependencies]
daft-dsl = {path = "../daft-dsl", version = "0.7.9", features = ["test-utils"]}
indoc = "2"
pretty_assertions = {workspace = true}
rand = {workspace = true}
rstest = {workspace = true}
test-log = {workspace = true}

[features]
python = [
  "daft-common/python",
  "dep:pyo3",
  "daft-core/python",
  "daft-dsl/python",
  "daft-functions/python",
  "daft-scan/python",
  "daft-schema/python"
]

[lib]
doctest = false

[lints]
workspace = true

[package]
license.workspace = true
repository.workspace = true
homepage.workspace = true
edition = {workspace = true}
name = "daft-logical-plan"
version = {workspace = true}
description = "Logical plan representation and builder for Daft"
