[dependencies]
common-checkpoint-config = {path = "../common/checkpoint-config", default-features = false, version = "0.3.0-dev0"}
common-daft-config = {path = "../common/daft-config", default-features = false, version = "0.3.0-dev0"}
common-display = {path = "../common/display", default-features = false, version = "0.3.0-dev0"}
daft-common-error = {path = "../common/error", default-features = false, version = "0.3.0-dev0"}
common-file-formats = {path = "../common/file-formats", default-features = false, version = "0.3.0-dev0"}
common-hashable-float-wrapper = {path = "../common/hashable-float-wrapper", default-features = false, version = "0.3.0-dev0"}
common-io-config = {path = "../common/io-config", default-features = false, version = "0.3.0-dev0"}
common-partitioning = {path = "../common/partitioning", default-features = false, version = "0.3.0-dev0"}
common-py-serde = {path = "../common/py-serde", default-features = false, version = "0.3.0-dev0"}
common-resource-request = {path = "../common/resource-request", default-features = false, version = "0.3.0-dev0"}
common-treenode = {path = "../common/treenode", default-features = false, version = "0.3.0-dev0"}
daft-algebra = {path = "../daft-algebra", default-features = false, version = "0.3.0-dev0"}
daft-checkpoint = {path = "../daft-checkpoint", default-features = false, features = ["s3"], version = "0.3.0-dev0"}
daft-core = {path = "../daft-core", default-features = false, version = "0.3.0-dev0"}
daft-dsl = {path = "../daft-dsl", default-features = false, version = "0.3.0-dev0"}
daft-functions = {path = "../daft-functions", default-features = false, version = "0.3.0-dev0"}
daft-scan = {path = "../daft-scan", default-features = false, version = "0.3.0-dev0"}
daft-functions-list = {path = "../daft-functions-list", default-features = false, version = "0.3.0-dev0"}
daft-functions-uri = {path = "../daft-functions-uri", default-features = false, version = "0.3.0-dev0"}
daft-recordbatch = {path = "../daft-recordbatch", default-features = false, version = "0.3.0-dev0"}
daft-schema = {path = "../daft-schema", default-features = false, version = "0.3.0-dev0"}
educe = {workspace = true}
indexmap = {workspace = true}
itertools = {workspace = true}
log = {workspace = true}
num-format = {workspace = true}
pyo3 = {workspace = true, optional = true}
serde = {workspace = true, features = ["rc"]}
snafu = {workspace = true}
tokio = {workspace = true}
serde_json.workspace = true
uuid.workspace = true

[dev-dependencies]
daft-dsl = {path = "../daft-dsl", features = ["test-utils"], version = "0.3.0-dev0"}
daft-functions-utf8 = {path = "../daft-functions-utf8", default-features = false, version = "0.3.0-dev0"}
indoc = "2"
pretty_assertions = {workspace = true}
rand = {workspace = true}
rstest = {workspace = true}
test-log = {workspace = true}

[features]
python = [
  "dep:pyo3",
  "common-checkpoint-config/python",
  "common-display/python",
  "daft-common-error/python",
  "common-io-config/python",
  "common-daft-config/python",
  "common-py-serde/python",
  "common-resource-request/python",
  "common-partitioning/python",
  "daft-core/python",
  "daft-dsl/python",
  "daft-functions/python",
  "daft-functions-list/python",
  "daft-scan/python",
  "daft-schema/python"
]

[lib]
doctest = false

[lints]
workspace = true

[package]
edition = {workspace = true}
name = "daft-logical-plan"
repository = {workspace = true}
license = {workspace = true}
description = "Logical plan for Daft"
version = {workspace = true}
