common-arrow-ffi = {path = "../common/arrow-ffi", default-features = false, optional = true, version = "0.3.0-dev0"}
common-display = {path = "../common/display", default-features = false, version = "0.3.0-dev0"}
daft-common-error = {path = "../common/error", default-features = false, version = "0.3.0-dev0"}
common-py-serde = {path = "../common/py-serde", default-features = false, version = "0.3.0-dev0"}
common-runtime = {path = "../common/runtime", default-features = false, version = "0.3.0-dev0"}
common-metrics = {path = "../common/metrics", default-features = false, version = "0.3.0-dev0"}
daft-core = {path = "../daft-core", default-features = false, version = "0.3.0-dev0"}
daft-groupby = {path = "../daft-groupby", default-features = false, version = "0.3.0-dev0"}
daft-dsl = {path = "../daft-dsl", default-features = false, version = "0.3.0-dev0"}
daft-functions-list = {path = "../daft-functions-list", default-features = false, version = "0.3.0-dev0"}
daft-image = {path = "../daft-image", default-features = false, version = "0.3.0-dev0"}
fnv = "1.0.7"
futures = {workspace = true}
smallvec = {workspace = true}
hashbrown = {workspace = true}
html-escape = {workspace = true}
indexmap = {workspace = true}
num-traits = {workspace = true}
