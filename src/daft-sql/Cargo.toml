[dependencies]
daft-common = {workspace = true}
daft-context = {path = "../daft-context", version = "0.7.9"}
daft-core = {path = "../daft-core", version = "0.7.9"}
daft-dsl = {path = "../daft-dsl", version = "0.7.9"}
daft-functions = {path = "../daft-functions", version = "0.7.9"}
daft-logical-plan = {path = "../daft-logical-plan", version = "0.7.9"}
daft-micropartition = {path = "../daft-micropartition", version = "0.7.9", default-features = false}
daft-recordbatch = {path = "../daft-recordbatch", version = "0.7.9"}
daft-session = {path = "../daft-session", version = "0.7.9"}
itertools = {workspace = true}
pyo3 = {workspace = true, optional = true}
sqlparser = {workspace = true}
regex.workspace = true
snafu.workspace = true

[dev-dependencies]
rstest = {workspace = true}

[features]
python = [
  "daft-common/python",
  "dep:pyo3",
  "daft-context/python",
  "daft-core/python",
  "daft-dsl/python",
  "daft-functions/python",
  "daft-logical-plan/python",
  "daft-micropartition/python",
  "daft-recordbatch/python",
  "daft-session/python"
]

[lints]
workspace = true

[package]
license.workspace = true
repository.workspace = true
homepage.workspace = true
name = "daft-sql"
edition.workspace = true
version.workspace = true
