[dependencies]
daft-common-error = {path = "../common/error", default-features = false, version = "0.3.0-dev0"}
daft-core = {path = "../daft-core", default-features = false, version = "0.3.0-dev0"}
daft-dsl = {path = "../daft-dsl", default-features = false, version = "0.3.0-dev0"}
jaq-core = {workspace = true}
jaq-json = {workspace = true, features = ["serde_json"]}
jaq-std = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
typetag = {workspace = true}

[features]
python = [
  "daft-common-error/python",
  "daft-core/python",
  "daft-dsl/python"
]

[lints]
workspace = true

[package]
name = "daft-functions-json"
repository = {workspace = true}
license = {workspace = true}
description = "JSON functions for Daft"
edition.workspace = true
version.workspace = true

[package.metadata.cargo-machete]
ignored = ["serde"]
