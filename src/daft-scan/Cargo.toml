[dependencies]
arrow-schema = {workspace = true}
common-daft-config = {path = "../common/daft-config", default-features = false, version = "0.3.0-dev0"}
common-display = {path = "../common/display", default-features = false, version = "0.3.0-dev0"}
daft-common-error = {path = "../common/error", default-features = false, version = "0.3.0-dev0"}
common-file-formats = {path = "../common/file-formats", default-features = false, version = "0.3.0-dev0"}
common-io-config = {path = "../common/io-config", default-features = false, version = "0.3.0-dev0"}
common-py-serde = {path = "../common/py-serde", default-features = false, version = "0.3.0-dev0"}
common-runtime = {path = "../common/runtime", default-features = false, version = "0.3.0-dev0"}
daft-algebra = {path = "../daft-algebra", default-features = false, version = "0.3.0-dev0"}
either = "1.9"
fnv = "1.0.7"
daft-core = {path = "../daft-core", default-features = false, version = "0.3.0-dev0"}
daft-csv = {path = "../daft-csv", default-features = false, version = "0.3.0-dev0"}
daft-decoding = {path = "../daft-decoding", default-features = false, version = "0.3.0-dev0"}
daft-dsl = {path = "../daft-dsl", default-features = false, version = "0.3.0-dev0"}
daft-io = {path = "../daft-io", default-features = false, version = "0.3.0-dev0"}
daft-json = {path = "../daft-json", default-features = false, version = "0.3.0-dev0"}
daft-parquet = {path = "../daft-parquet", default-features = false, version = "0.3.0-dev0"}
daft-recordbatch = {path = "../daft-recordbatch", default-features = false, version = "0.3.0-dev0"}
daft-schema = {path = "../daft-schema", default-features = false, version = "0.3.0-dev0"}
daft-stats = {path = "../daft-stats", default-features = false, version = "0.3.0-dev0"}
daft-compression = {path = "../daft-compression", default-features = false, version = "0.3.0-dev0"}
async-trait = {workspace = true}
futures = {workspace = true}
indexmap = {workspace = true}
itertools = {workspace = true}
pyo3 = {workspace = true, optional = true}
serde = {workspace = true}
serde_json = {workspace = true, optional = true}
snafu = {workspace = true}
tokio = {workspace = true, optional = true}
tokio-stream = {workspace = true, optional = true}
url = {workspace = true}
urlencoding = "2.1.3"

[dev-dependencies]
tokio = {workspace = true, features = ["full"]}

[features]
python = [
  "dep:pyo3",
  "dep:serde_json",
  "dep:tokio",
  "dep:tokio-stream",
  "daft-common-error/python",
  "common-py-serde/python",
  "daft-core/python",
  "daft-dsl/python",
  "daft-recordbatch/python",
  "daft-schema/python",
  "daft-stats/python",
  "common-file-formats/python",
  "common-io-config/python",
  "common-daft-config/python"
]

[lints]
workspace = true

[package]
edition = {workspace = true}
name = "daft-scan"
repository = {workspace = true}
license = {workspace = true}
description = "Scan operations for Daft"
version = {workspace = true}
