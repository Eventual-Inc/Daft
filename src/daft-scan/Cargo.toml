[dependencies]
arrow-schema = {workspace = true}
daft-algebra = {path = "../daft-algebra", version = "0.7.9", default-features = false}
daft-common = {workspace = true}
either = "1.9"
fnv = "1.0.7"
daft-core = {path = "../daft-core", version = "0.7.9", default-features = false}
daft-csv = {path = "../daft-csv", version = "0.7.9", default-features = false}
daft-dsl = {path = "../daft-dsl", version = "0.7.9", default-features = false}
daft-io = {path = "../daft-io", version = "0.7.9", default-features = false}
daft-json = {path = "../daft-json", version = "0.7.9", default-features = false}
daft-parquet = {path = "../daft-parquet", version = "0.7.9", default-features = false}
daft-recordbatch = {path = "../daft-recordbatch", version = "0.7.9", default-features = false}
daft-schema = {path = "../daft-schema", version = "0.7.9", default-features = false}
async-trait = {workspace = true}
futures = {workspace = true}
indexmap = {workspace = true}
itertools = {workspace = true}
pyo3 = {workspace = true, optional = true}
serde = {workspace = true}
serde_json = {workspace = true, optional = true}
snafu = {workspace = true}
tokio = {workspace = true, optional = true}
tokio-stream = {workspace = true, optional = true}
url = {workspace = true}
urlencoding = "2.1.3"

[dev-dependencies]
tokio = {workspace = true, features = ["full"]}

[features]
python = [
  "daft-common/python",
  "dep:pyo3",
  "dep:serde_json",
  "dep:tokio",
  "dep:tokio-stream",
  "daft-core/python",
  "daft-dsl/python",
  "daft-recordbatch/python",
  "daft-schema/python",
]

[lints]
workspace = true

[package]
license.workspace = true
repository.workspace = true
homepage.workspace = true
edition = {workspace = true}
name = "daft-scan"
version = {workspace = true}
description = "Scan operators and data source integration for Daft"
