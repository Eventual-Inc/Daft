[[bench]]
harness = false
name = "parquet_read"

[dependencies]
arrow = {workspace = true}
common-arrow-ffi = {path = "../common/arrow-ffi", default-features = false, optional = true, version = "0.3.0-dev0"}
bytes = {workspace = true}
daft-common-error = {path = "../common/error", default-features = false, version = "0.3.0-dev0"}
common-runtime = {path = "../common/runtime", default-features = false, version = "0.3.0-dev0"}
daft-core = {path = "../daft-core", default-features = false, version = "0.3.0-dev0"}
daft-dsl = {path = "../daft-dsl", default-features = false, version = "0.3.0-dev0"}
daft-io = {path = "../daft-io", default-features = false, version = "0.3.0-dev0"}
daft-recordbatch = {path = "../daft-recordbatch", default-features = false, version = "0.3.0-dev0"}
daft-stats = {path = "../daft-stats", default-features = false, version = "0.3.0-dev0"}
futures = {workspace = true}
indexmap = {workspace = true}
parquet = {workspace = true, features = ["async"]}
pyo3 = {workspace = true, optional = true}
rayon = {workspace = true}
serde = {workspace = true}
snafu = {workspace = true}
tokio = {workspace = true}
tokio-stream = {workspace = true}

[dev-dependencies]
bincode = {workspace = true}
fastrand = "2.1.0"
parquet = {workspace = true}
path_macro = {workspace = true}
tango-bench.workspace = true

[features]
python = [
  "dep:pyo3",
  "dep:common-arrow-ffi",
  "daft-common-error/python",
  "daft-core/python",
  "daft-io/python",
  "daft-recordbatch/python",
  "daft-stats/python",
  "daft-dsl/python"
]

[lints]
workspace = true

[package]
edition = {workspace = true}
name = "daft-parquet"
description = "Parquet reader for Daft"
license = {workspace = true}
repository = {workspace = true}
version = {workspace = true}
