[[bench]]
harness = false
name = "parquet_read"

[dependencies]
arrow = {workspace = true}
common-arrow-ffi = {path = "../common/arrow-ffi", version = "0.7.9", default-features = false, optional = true}
bytes = {workspace = true}
daft-common = {workspace = true}
daft-core = {path = "../daft-core", version = "0.7.9", default-features = false}
daft-dsl = {path = "../daft-dsl", version = "0.7.9", default-features = false}
daft-io = {path = "../daft-io", version = "0.7.9", default-features = false}
daft-recordbatch = {path = "../daft-recordbatch", version = "0.7.9", default-features = false}
futures = {workspace = true}
indexmap = {workspace = true}
parquet = {workspace = true, features = ["async"]}
pyo3 = {workspace = true, optional = true}
rayon = {workspace = true}
serde = {workspace = true}
snafu = {workspace = true}
tokio = {workspace = true}
tokio-stream = {workspace = true}

[dev-dependencies]
bincode = {workspace = true}
fastrand = "2.1.0"
parquet = {workspace = true}
path_macro = {workspace = true}
tango-bench.workspace = true

[features]
python = [
  "daft-common/python",
  "dep:pyo3",
  "dep:common-arrow-ffi",
  "daft-core/python",
  "daft-io/python",
  "daft-recordbatch/python",
  "daft-dsl/python"
]

[lints]
workspace = true

[package]
license.workspace = true
repository.workspace = true
homepage.workspace = true
edition = {workspace = true}
name = "daft-parquet"
version = {workspace = true}
description = "Parquet reader and writer for Daft"
