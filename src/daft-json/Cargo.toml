[dependencies]
arrow = {workspace = true}
chrono = {workspace = true}
daft-common = {workspace = true}
daft-core = {path = "../daft-core", version = "0.7.9", default-features = false}
daft-schema = {path = "../daft-schema", version = "0.7.9", default-features = false}
daft-dsl = {path = "../daft-dsl", version = "0.7.9", default-features = false}
daft-io = {path = "../daft-io", version = "0.7.9", default-features = false}
daft-recordbatch = {path = "../daft-recordbatch", version = "0.7.9", default-features = false}
futures = {workspace = true}
indexmap = {workspace = true}
memchr = "2.7.6"
memmap2 = "0.9.9"
num-traits = {workspace = true}
pyo3 = {workspace = true, optional = true}
rayon = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true, features = ["raw_value"]}
simd-json = {version = "0.13", features = ["known-key"]}
snafu = {workspace = true}
tokio = {workspace = true}
tokio-stream = {workspace = true, features = ["io-util"]}
tokio-util = {workspace = true}

[dev-dependencies]
rstest = {workspace = true}

[features]
python = [
  "daft-common/python",
  "dep:pyo3",
  "daft-core/python",
  "daft-io/python",
  "daft-recordbatch/python",
  "daft-dsl/python"
]

[lints]
workspace = true

[package]
license.workspace = true
repository.workspace = true
homepage.workspace = true
edition = {workspace = true}
name = "daft-json"
version = {workspace = true}
description = "JSON reader and writer for Daft"
