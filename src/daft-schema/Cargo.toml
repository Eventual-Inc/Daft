[dependencies]
arrow = {workspace = true}
arrow-schema = {workspace = true}
common-arrow-ffi = {path = "../common/arrow-ffi", default-features = false, optional = true, version = "0.3.0-dev0"}
common-display = {path = "../common/display", default-features = false, version = "0.3.0-dev0"}
daft-common-error = {path = "../common/error", default-features = false, version = "0.3.0-dev0"}
common-py-serde = {path = "../common/py-serde", default-features = false, version = "0.3.0-dev0"}
common-version = {path = "../common/version", default-features = false}
derive_more = {workspace = true}
educe = {workspace = true}
html-escape = {workspace = true}
indexmap = {workspace = true}
num-derive = {workspace = true}
num-traits = {workspace = true}
pyo3 = {workspace = true, optional = true}
serde = {workspace = true, features = ["rc"]}
serde_json = {workspace = true}
chrono = {workspace = true}
chrono-tz = {workspace = true}

[dev-dependencies]
rstest = {workspace = true}

[features]
python = [
  "dep:pyo3",
  "daft-common-error/python",
  "common-display/python",
  "common-py-serde/python",
  "dep:common-arrow-ffi"
]

[lints]
workspace = true

[package]
edition = {workspace = true}
name = "daft-schema"
repository = {workspace = true}
license = {workspace = true}
description = "Schema types for Daft"
version = {workspace = true}

[package.metadata.cargo-machete]
ignored = ["num-traits"]  # needed by num-derive
