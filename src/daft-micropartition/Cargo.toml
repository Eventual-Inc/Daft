  "common-partitioning/python",
  "daft-core/python",
  "daft-dsl/python",
  "daft-recordbatch/python",
  "daft-io/python",
  "daft-parquet/python",
  "daft-scan/python",
  "daft-stats/python",
  "daft-csv/python",
  "daft-json/python"
