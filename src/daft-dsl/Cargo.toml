[dependencies]
async-trait = {workspace = true}
common-runtime = {path = "../common/runtime", default-features = false, version = "0.3.0-dev0"}
daft-common-error = {path = "../common/error", default-features = false, version = "0.3.0-dev0"}
common-hashable-float-wrapper = {path = "../common/hashable-float-wrapper", version = "0.3.0-dev0"}
daft-common-macros = {path = "../common/macros", version = "0.3.0-dev0"}
common-py-serde = {path = "../common/py-serde", default-features = false, version = "0.3.0-dev0"}
common-resource-request = {path = "../common/resource-request", default-features = false, version = "0.3.0-dev0"}
common-treenode = {path = "../common/treenode", default-features = false, version = "0.3.0-dev0"}
common-metrics = {path = "../common/metrics", default-features = false, version = "0.3.0-dev0"}
common-tracing = {path = "../common/tracing", default-features = false, version = "0.3.0-dev0"}
daft-core = {path = "../daft-core", default-features = false, version = "0.3.0-dev0"}
daft-sketch = {path = "../daft-sketch", default-features = false, version = "0.3.0-dev0"}
derive_more = {workspace = true}
indexmap = {workspace = true}
itertools = {workspace = true}
log = {workspace = true}
pyo3 = {workspace = true, optional = true}
rand = {workspace = true}
serde = {workspace = true}
tokio = {workspace = true, optional = true}
typetag = {workspace = true}
opentelemetry = {workspace = true}

[dev-dependencies]
rstest = {workspace = true}
opentelemetry_sdk = {workspace = true, features = ["testing"]}

[features]
python = [
  "dep:pyo3",
  "dep:tokio",
  "daft-common-error/python",
  "common-runtime/python",
  "daft-core/python",
  "common-treenode/python",
  "common-py-serde/python",
  "common-resource-request/python",
  "common-metrics/python"
]
test-utils = []

[lints]
workspace = true

[package]
edition = {workspace = true}
name = "daft-dsl"
repository = {workspace = true}
license = {workspace = true}
description = "Domain-specific language for Daft expressions"
version = {workspace = true}
