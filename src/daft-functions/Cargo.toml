[dependencies]
daft-common-error = {path = "../common/error", default-features = false, version = "0.3.0-dev0"}
daft-core = {path = "../daft-core", default-features = false, version = "0.3.0-dev0"}
daft-dsl = {path = "../daft-dsl", default-features = false, version = "0.3.0-dev0"}
daft-hash = {workspace = true}
xxhash-rust = {workspace = true}
arrow-array = {workspace = true}
arrow-buffer = {workspace = true}
num-traits = {workspace = true}
pyo3 = {workspace = true, optional = true}
typetag = {workspace = true}
serde = {workspace = true}
snafu = {workspace = true}
uuid = {workspace = true}
rand = {workspace = true}

[features]
python = [
  "daft-common-error/python",
  "daft-core/python",
  "daft-dsl/python",
  "dep:pyo3"
]

[lints]
workspace = true

[package]
name = "daft-functions"
repository = {workspace = true}
license = {workspace = true}
description = "Built-in functions for Daft"
edition.workspace = true
version.workspace = true
